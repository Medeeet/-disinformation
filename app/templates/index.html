<section class="analyze-form">
    <form hx-post="/api/v1/analyze" hx-target="#results" hx-indicator="#loading">
        <div class="form-group">
            <label for="text">Талдауға арналған мәтін</label>
            <textarea id="text" name="text" rows="8"
                      placeholder="Әлеуметтік желідегі жарияланым мәтінін қойыңыз..."></textarea>
        </div>
        <div class="form-group">
            <label for="url">Немесе мақаланың URL-ін көрсетіңіз</label>
            <input type="url" id="url" name="url" placeholder="https://example.com/article">
        </div>
        <button type="submit" class="btn btn-primary">Талдау</button>
    </form>

    <div id="loading" class="htmx-indicator">
        <div class="spinner"></div>
        <p>Мәтін талдануда...</p>
    </div>

    <div id="results"></div>
</section>

<script>
function fillExample(card) {
    const text = card.querySelector('p').textContent.trim();
    document.getElementById('text').value = text;
    document.getElementById('url').value = '';
    document.getElementById('text').scrollIntoView({ behavior: 'smooth', block: 'center' });
    document.getElementById('text').focus();
}
function fillUrl(card) {
    const url = card.dataset.url;
    document.getElementById('url').value = url;
    document.getElementById('text').value = '';
    document.getElementById('url').scrollIntoView({ behavior: 'smooth', block: 'center' });
}
function switchTab(btn, tabId) {
    document.querySelectorAll('.examples-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.examples-grid').forEach(g => g.style.display = 'none');
    document.getElementById(tabId).style.display = 'grid';
}
</script>
